<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/game.css">
    <title>Blogémon</title>
  </head>
  <body class="game-body">
    <main class="game-page">
      <div class="game-stage">
        <canvas id="game-canvas" width="160" height="144" aria-label="Top-down room game"></canvas>
      </div>

      <section id="post-popup" class="post-popup hidden" role="dialog" aria-live="polite" aria-modal="true">
        <div class="post-popup-inner">
          <h2 id="post-title">Loading...</h2>
          <p id="post-excerpt"></p>
          <div class="post-actions">
            <a id="post-link" href="#" target="_blank" rel="noopener noreferrer">Read full post</a>
            <button id="post-close" type="button">Close (E)</button>
          </div>
        </div>
      </section>
    </main>

    <script defer src="/static/game.js"></script>
    <script defer src="/static/theme-switch.js"></script>
  </body>
</html>
