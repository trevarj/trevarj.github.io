<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Game Sprite Debug</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #0c0f18;
        color: #e6eaf5;
        font-family: monospace, ui-monospace, Menlo, Monaco, "Courier New", monospace;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .panel {
        display: grid;
        gap: 0.6rem;
        padding: 0.75rem;
        max-width: 100%;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        font-size: 0.95rem;
      }

      label {
        display: grid;
        gap: 0.2rem;
        font-size: 0.8rem;
      }

      label span {
        color: #d4dbe8;
      }

      #sheet-wrap {
        border: 1px solid #334;
        background: #111827;
        image-rendering: pixelated;
      }

      #sheet {
        display: block;
        image-rendering: pixelated;
      }

      .info {
        min-height: 7.5rem;
        background: #111827;
        border: 1px solid #334;
        padding: 0.5rem;
        white-space: pre-wrap;
      }

      .preview-row {
        display: flex;
        gap: 0.75rem;
        align-items: flex-start;
      }

      #preview {
        background: #111827;
        border: 1px solid #334;
        image-rendering: pixelated;
      }

      button {
        width: fit-content;
        background: #1e293b;
        color: #e6eaf5;
        border: 1px solid #3b4c6d;
        padding: 0.35rem 0.6rem;
        font: inherit;
      }

      input[type="number"] {
        width: 4rem;
        background: #111827;
        color: #e6eaf5;
        border: 1px solid #3b4c6d;
      }

      button:hover {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div id="sheet-wrap">
        <canvas id="sheet"></canvas>
      </div>
      <div class="meta">
        <label>
          <span>Image</span>
          <input id="sprite-src" type="text" value="/static/assets/game/players_house.png" size="45">
        </label>
        <label>
          <span>Tile width</span>
          <input id="tile-w" type="number" min="1" value="16">
        </label>
        <label>
          <span>Tile height</span>
          <input id="tile-h" type="number" min="1" value="16">
        </label>
        <label>
          <span>Scale</span>
          <input id="scale" type="number" min="1" max="16" value="8">
        </label>
        <label>
          <span>Copy selection</span>
          <button id="copy" type="button">Copy object JSON</button>
        </label>
      </div>
      <div class="preview-row">
        <pre id="coords" class="info">Load status...</pre>
        <canvas id="preview" width="1" height="1"></canvas>
      </div>
    </div>

    <script>
      const sourceInput = document.getElementById("sprite-src");
      const tileWInput = document.getElementById("tile-w");
      const tileHInput = document.getElementById("tile-h");
      const scaleInput = document.getElementById("scale");
      const copyButton = document.getElementById("copy");
      const canvas = document.getElementById("sheet");
      const context = canvas.getContext("2d");
      const preview = document.getElementById("preview");
      const previewContext = preview.getContext("2d");
      const coords = document.getElementById("coords");

      let spriteImage = new Image();
      let latestCell = null;
      let selection = null;
      let dragStart = null;
      let scale = Number(scaleInput.value);
      let tileW = Number(tileWInput.value);
      let tileH = Number(tileHInput.value);

      const clampNumber = (value, fallback) => (Number.isFinite(value) ? value : fallback);

      const clampToSheet = (value, max) => Math.max(0, Math.min(max, value));

      const getPointer = (event) => {
        const bounds = canvas.getBoundingClientRect();
        return {
          x: clampToSheet(Math.floor((event.clientX - bounds.left) / scale), spriteImage.naturalWidth - 1),
          y: clampToSheet(Math.floor((event.clientY - bounds.top) / scale), spriteImage.naturalHeight - 1),
        };
      };

      const snapRect = (start, end) => {
        const left = Math.floor(Math.min(start.x, end.x) / tileW) * tileW;
        const top = Math.floor(Math.min(start.y, end.y) / tileH) * tileH;
        const right = Math.ceil((Math.max(start.x, end.x) + 1) / tileW) * tileW;
        const bottom = Math.ceil((Math.max(start.y, end.y) + 1) / tileH) * tileH;
        return {
          x: clampToSheet(left, spriteImage.naturalWidth),
          y: clampToSheet(top, spriteImage.naturalHeight),
          w: Math.max(tileW, Math.min(right, spriteImage.naturalWidth) - left),
          h: Math.max(tileH, Math.min(bottom, spriteImage.naturalHeight) - top),
        };
      };

      const drawPreview = () => {
        if (!selection || !spriteImage.complete) {
          preview.width = 1;
          preview.height = 1;
          return;
        }

        preview.width = selection.w * scale;
        preview.height = selection.h * scale;
        previewContext.imageSmoothingEnabled = false;
        previewContext.clearRect(0, 0, preview.width, preview.height);
        previewContext.drawImage(
          spriteImage,
          selection.x,
          selection.y,
          selection.w,
          selection.h,
          0,
          0,
          preview.width,
          preview.height,
        );
      };

      const describeSelection = () => {
        if (!selection) {
          return;
        }

        coords.textContent = [
          `selection: ${selection.x}, ${selection.y}, ${selection.w}, ${selection.h}`,
          `tiles: ${selection.w / tileW} x ${selection.h / tileH}`,
          `object JSON:`,
          `sprite: { x: ${selection.x}, y: ${selection.y}, w: ${selection.w}, h: ${selection.h} },`,
          `hitbox: { x: 0, y: 0, w: ${selection.w}, h: ${selection.h} },`,
        ].join("\n");
        drawPreview();
      };

      const render = () => {
        if (!spriteImage.complete || !spriteImage.naturalWidth) {
          coords.textContent = "Waiting for image to load...";
          return;
        }

        canvas.width = spriteImage.naturalWidth * scale;
        canvas.height = spriteImage.naturalHeight * scale;
        context.imageSmoothingEnabled = false;
        context.clearRect(0, 0, canvas.width, canvas.height);
        context.drawImage(spriteImage, 0, 0, canvas.width, canvas.height);

        context.save();
        context.strokeStyle = "rgba(255,255,255,0.28)";
        context.lineWidth = 1;
        for (let x = 0; x <= spriteImage.naturalWidth; x += tileW) {
          context.beginPath();
          context.moveTo(x * scale, 0);
          context.lineTo(x * scale, canvas.height);
          context.stroke();
        }
        for (let y = 0; y <= spriteImage.naturalHeight; y += tileH) {
          context.beginPath();
          context.moveTo(0, y * scale);
          context.lineTo(canvas.width, y * scale);
          context.stroke();
        }
        context.restore();

        if (latestCell) {
          const { cellX, cellY } = latestCell;
          context.save();
          context.strokeStyle = "#ffef70";
          context.lineWidth = 2;
          context.strokeRect(cellX * tileW * scale, cellY * tileH * scale, tileW * scale, tileH * scale);
          context.restore();
        }

        if (selection) {
          context.save();
          context.strokeStyle = "#74f29a";
          context.lineWidth = 2;
          context.strokeRect(selection.x * scale, selection.y * scale, selection.w * scale, selection.h * scale);
          context.restore();
        }
      };

      const updateCell = (event) => {
        const { x: px, y: py } = getPointer(event);
        if (px < 0 || py < 0 || px >= spriteImage.naturalWidth || py >= spriteImage.naturalHeight) {
          return;
        }

        const cellX = Math.floor(px / tileW);
        const cellY = Math.floor(py / tileH);
        const sourceX = cellX * tileW;
        const sourceY = cellY * tileH;
        latestCell = { cellX, cellY, sourceX, sourceY };
        if (!selection) {
          coords.textContent = [
            `source: ${sourceX}, ${sourceY}`,
            `cell: ${cellX}, ${cellY}`,
            `tile: ${tileWidthLabel()} x ${tileHeightLabel()}`,
            `single tile JSON:`,
            `sprite: { x: ${sourceX}, y: ${sourceY}, w: ${tileW}, h: ${tileH} },`,
          ].join("\n");
        }
        render();
      };

      const tileWidthLabel = () => tileW;
      const tileHeightLabel = () => tileH;

      const loadSheet = () => {
        spriteImage = new Image();
        spriteImage.onload = () => {
          selection = null;
          latestCell = null;
          render();
        };
        spriteImage.onerror = () => {
          coords.textContent = `Failed to load: ${sourceInput.value}`;
        };
        spriteImage.src = sourceInput.value;
      };

      canvas.addEventListener("pointerdown", (event) => {
        dragStart = getPointer(event);
        selection = snapRect(dragStart, dragStart);
        canvas.setPointerCapture(event.pointerId);
        describeSelection();
        render();
      });
      canvas.addEventListener("pointermove", (event) => {
        updateCell(event);
        if (!dragStart) {
          return;
        }
        selection = snapRect(dragStart, getPointer(event));
        describeSelection();
        render();
      });
      canvas.addEventListener("pointerup", (event) => {
        if (dragStart) {
          selection = snapRect(dragStart, getPointer(event));
          dragStart = null;
          describeSelection();
          render();
        }
      });
      scaleInput.addEventListener("input", () => {
        scale = clampNumber(Number(scaleInput.value), 8);
        drawPreview();
        render();
      });
      tileWInput.addEventListener("change", () => {
        tileW = clampNumber(Number(tileWInput.value), 16);
        selection = null;
        render();
      });
      tileHInput.addEventListener("change", () => {
        tileH = clampNumber(Number(tileHInput.value), 16);
        selection = null;
        render();
      });
      copyButton.addEventListener("click", async () => {
        if (!selection) {
          return;
        }
        const payload = `sprite: { x: ${selection.x}, y: ${selection.y}, w: ${selection.w}, h: ${selection.h} },`;
        await navigator.clipboard.writeText(payload);
      });

      copyButton.type = "button";
      sourceInput.addEventListener("change", loadSheet);

      loadSheet();
    </script>
  </body>
</html>
